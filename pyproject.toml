[project]
name = "aaaat"
version = "0.1.0"
description = "Local-first job application tracker and artifact generator."
requires-python = ">=3.11"
dependencies = [
    "fastapi",
    "uvicorn",
    "jinja2",
    "python-multipart",
]

[project.optional-dependencies]
test = ["httpx"]
desktop = ["wxPython"]

[project.scripts]
aaaat = "aaaat.cli:main"
aaaat-desktop = "aaaat.ui_desktop.app:main"
aaaat-seed-desktop-demo = "aaaat.demo_seed:main"

[tool.setuptools]
packages = ["aaaat", "aaaat.dispatch", "aaaat.ui_desktop"]
include-package-data = true

[tool.setuptools.package-data]
aaaat = [
    "schema.sql",
    "static/*",
    "templates_ui/*.html",
    "templates_ui/partials/*.html",
    "templates_ui/assets/*",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
