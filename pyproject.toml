[project]
name = "aaaat"
version = "0.1.0"
description = "Local-first job application tracker and artifact generator."
requires-python = ">=3.11"
dependencies = [
    "fastapi",
    "uvicorn",
    "jinja2",
    "python-multipart",
]

[project.optional-dependencies]
test = ["httpx"]

[project.scripts]
aaaat = "aaaat.cli:main"

[tool.setuptools]
packages = ["aaaat"]
include-package-data = true

[tool.setuptools.package-data]
aaaat = [
    "schema.sql",
    "static/*",
    "templates_ui/*.html",
    "templates_ui/partials/*.html",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
