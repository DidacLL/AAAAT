name: AAAAT Behavioral Tests

on:
  push:
  pull_request:

jobs:
  behavioral-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install package
        run: python -m pip install -e .
      - name: Compile package and tests
        run: python -m compileall -q aaaat tests
      - name: Agent boundary behavior
        run: python -B -m unittest tests.test_agent_access
      - name: Domain profile variables
        run: python -B -m unittest tests.test_domain_services.DomainServiceTests.test_profile_variables_use_canonical_privacy_storage
      - name: Domain privacy exposure
        run: python -B -m unittest tests.test_domain_services.DomainServiceTests.test_privacy_exposure_is_scope_specific
      - name: Domain candidature related records
        run: python -B -m unittest tests.test_domain_services.DomainServiceTests.test_candidature_related_records_and_initial_preparation_are_durable
      - name: Domain field inference conflicts
        run: python -B -m unittest tests.test_domain_services.DomainServiceTests.test_field_inference_preserves_current_user_values
      - name: Domain text result conflicts
        run: python -B -m unittest tests.test_domain_services.DomainServiceTests.test_conflicting_text_result_remains_history
      - name: Domain keyword results
        run: python -B -m unittest tests.test_domain_services.DomainServiceTests.test_keyword_result_updates_empty_definition
      - name: Domain artifact result
        run: python -B -m unittest tests.test_domain_services.DomainServiceTests.test_artifact_backed_document_result_becomes_reviewed
      - name: Domain candidature records
        run: python -B -m unittest tests.test_domain_services.DomainServiceTests.test_todo_note_and_text_blob_are_durable
      - name: Domain keyword metadata
        run: python -B -m unittest tests.test_domain_services.DomainServiceTests.test_keyword_alias_and_note_are_durable
      - name: Domain search behavior
        run: python -B -m unittest tests.test_domain_services.DomainServiceTests.test_search_uses_sanitized_fts_queries
      - name: Profile fact behavior
        run: python -B -m unittest tests.test_profile_facts
      - name: Template and artifact behavior
        run: python -B -m unittest tests.test_templates
      - name: Desktop release behavior
        run: >-
          python -B -m unittest
          tests.test_local_desktop_dashboard_slice
          tests.test_profile_links_and_preparation
          tests.test_desktop_material_attachment
          tests.test_desktop_material_details
          tests.test_desktop_profile_facts
          tests.test_demo_seed_safety
      - name: MCP descriptor validation
        run: python -B -m aaaat.cli mcp-validate
      - name: Full unittest discovery
        run: python -B -m unittest discover -s tests
