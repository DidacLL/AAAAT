name: AAAAT Validation and Release

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  behavioral-tests:
    name: Behavioral tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheel
        run: python -m pip wheel . --no-deps --wheel-dir dist
      - name: Install wheel
        run: python -m pip install dist/aaaat-*.whl
      - name: Check installed runtime entry points
        working-directory: ${{ runner.temp }}
        run: |
          aaaat-desktop --help
          aaaat-host-bridge --help
      - name: Compile package, release tools, and tests
        run: python -m compileall -q aaaat tests tools/build_release.py tools/verify_release.py
      - name: Run complete behavioral suite
        shell: bash
        run: |
          set -o pipefail
          python -B -m unittest discover -s tests 2>&1 | tee behavioral-test-output.txt
      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: behavioral-test-output-${{ matrix.python-version }}
          path: behavioral-test-output.txt
          if-no-files-found: error
          retention-days: 7

  release-packages:
    name: Package and verify (${{ matrix.os }})
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Python
        if: runner.os != 'Linux'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packaged-build dependencies
        if: runner.os != 'Linux'
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[desktop,release]"

      - name: Install Linux packaged-build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-venv python3-wxgtk4.0 xvfb
          python3 -m venv --system-site-packages .release-venv
          .release-venv/bin/python -m pip install --upgrade pip
          .release-venv/bin/python -m pip install ".[release]"

      - name: Build and verify package
        if: runner.os != 'Linux'
        run: |
          python tools/build_release.py
          python tools/verify_release.py

      - name: Build and verify Linux package
        if: runner.os == 'Linux'
        shell: bash
        run: |
          .release-venv/bin/python tools/build_release.py
          xvfb-run -a .release-venv/bin/python tools/verify_release.py

      - name: Upload verified package
        uses: actions/upload-artifact@v4
        with:
          name: AAAAT-${{ runner.os }}-${{ runner.arch }}
          path: |
            dist/AAAAT-*.zip
            dist/AAAAT-*.zip.sha256
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish versioned release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [behavioral-tests, release-packages]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download verified packages
        uses: actions/download-artifact@v4
        with:
          pattern: AAAAT-*
          path: release
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release/*.zip release/*.zip.sha256 --clobber
          else
            gh release create "$GITHUB_REF_NAME" release/*.zip release/*.zip.sha256 --verify-tag --generate-notes
          fi
