name: Agent Contract Tests

on:
  push:
  pull_request:

jobs:
  agent-contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Compile Python sources
        run: python -m compileall -q aaaat tests
      - name: Install package with test dependencies
        run: python -m pip install -q -e .[test]
      - name: Rebuilt intake and task architecture
        run: python -B -m unittest tests.test_v1_rebuild_architecture
      - name: Agent authority and runtime contracts
        run: python -B -m unittest tests.test_agent_access tests.test_fastapi_server
      - name: Domain and profile behavior
        run: python -B -m unittest tests.test_domain_services tests.test_profile_facts
      - name: Template and artifact behavior
        run: python -B -m unittest tests.test_templates
      - name: Dashboard renderer compatibility
        run: python -B -m unittest tests.test_dashboard_views tests.test_static_export
      - name: MCP descriptor validation
        run: python -B -m aaaat.cli mcp-validate
      - name: Full unittest discovery
        id: discovery
        shell: bash
        run: |
          set +e
          python -B -m unittest discover -s tests > full-discovery.log 2>&1
          status=$?
          cat full-discovery.log
          exit $status
      - name: Upload discovery diagnostics
        if: failure() && steps.discovery.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: full-discovery
          path: full-discovery.log
          retention-days: 1

  desktop-frame-construction:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install desktop package
        run: python -m pip install -q -e .[desktop,test]
      - name: Construct real desktop frame
        run: python -B tests/desktop_frame_construction.py
