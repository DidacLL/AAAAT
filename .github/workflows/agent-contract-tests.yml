name: AAAAT Behavioral Tests

on:
  push:
  pull_request:

jobs:
  behavioral-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install package
        run: python -m pip install -e .
      - name: Compile package and tests
        run: python -m compileall -q aaaat tests
      - name: Full unittest discovery
        id: discovery
        continue-on-error: true
        run: python -B -m unittest discover -s tests > unittest-discovery.log 2>&1
      - name: Upload discovery diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: unittest-discovery-final
          path: unittest-discovery.log
      - name: Preserve discovery result
        if: steps.discovery.outcome == 'failure'
        run: exit 1
