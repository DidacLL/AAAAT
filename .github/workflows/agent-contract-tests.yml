name: AAAAT Behavioral Tests

on:
  push:
  pull_request:

jobs:
  behavioral-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build wheel
        run: python -m pip wheel . --no-deps --wheel-dir dist
      - name: Record candidate checksum
        run: |
          cd dist
          sha256sum aaaat-*.whl > SHA256SUMS
      - name: Install wheel
        run: python -m pip install dist/aaaat-*.whl
      - name: Smoke test installed commands
        run: |
          aaaat --version
          aaaat-desktop --help
          aaaat-upgrade --help
          aaaat-seed-desktop-demo --help
      - name: Compile package and tests
        run: python -m compileall -q aaaat tests
      - name: Validate agent descriptor
        run: python -B -m aaaat.cli mcp-validate
      - name: Run complete behavioral suite
        run: python -B -m unittest discover -s tests
      - name: Upload validated candidate
        uses: actions/upload-artifact@v4
        with:
          name: aaaat-v1-candidate
          path: |
            dist/aaaat-*.whl
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 14
