name: Agent Contract Tests

on:
  push:
  pull_request:

jobs:
  agent-contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Compile Python sources
        run: python -m compileall -q aaaat tests
      - name: Install package with test dependencies
        run: python -m pip install -e .[test]
      - name: Intake-driven assistance behavior
        run: python -B -m unittest tests.test_intake_assistance_clean_rebuild
      - name: Agent authority and runtime contracts
        run: python -B -m unittest tests.test_agent_access tests.test_fastapi_server
      - name: Domain and profile behavior
        run: python -B -m unittest tests.test_domain_services tests.test_profile_facts
      - name: Template and artifact behavior
        run: python -B -m unittest tests.test_templates
      - name: Dashboard mode and renderer compatibility
        run: python -B -m unittest tests.test_dashboard_views tests.test_dashboard_modes tests.test_static_export
      - name: MCP descriptor validation
        run: python -B -m aaaat.cli mcp-validate
      - name: Full unittest discovery
        run: python -B -m unittest discover -s tests

  desktop-frame-construction:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install desktop package
        run: python -m pip install -e .[desktop]
      - name: Construct Smart Detailed User and Detailed-to-Smart flow
        run: python -B tests/desktop_frame_smoke.py
