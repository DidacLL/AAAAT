name: AAAAT Behavioral Tests

on:
  push:
  pull_request:

jobs:
  behavioral-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install package
        run: python -m pip install -e .
      - name: Compile package and tests
        run: python -m compileall -q aaaat tests
      - name: Full unittest discovery traceback
        shell: bash
        run: |
          set +e
          python -B -m unittest discover -s tests > /tmp/unittest.log 2>&1
          status=$?
          tail -100 /tmp/unittest.log
          exit $status
