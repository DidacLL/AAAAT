name: AAAAT Behavioral Tests

on:
  push:
  pull_request:

jobs:
  behavioral-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheel
        run: python -m pip wheel . --no-deps --wheel-dir dist
      - name: Install wheel
        run: python -m pip install dist/aaaat-*.whl
      - name: Check installed runtime entry points
        working-directory: ${{ runner.temp }}
        run: |
          aaaat-desktop --help
          aaaat-host-bridge --help
      - name: Check maintainer release recipe
        run: |
          python -m py_compile tools/build_release.py
          python tools/build_release.py --help
      - name: Compile package and tests
        run: python -m compileall -q aaaat tests
      - name: Run complete behavioral suite
        shell: bash
        run: |
          set -o pipefail
          python -B -m unittest discover -s tests 2>&1 | tee behavioral-test-output.txt
      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: behavioral-test-output-${{ matrix.python-version }}
          path: behavioral-test-output.txt
          if-no-files-found: error
          retention-days: 7
