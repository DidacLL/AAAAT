name: AAAAT Behavioral Tests

on:
  push:
  pull_request:

jobs:
  behavioral-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheel
        run: python -m pip wheel . --no-deps --wheel-dir dist
      - name: Build source distribution
        if: matrix.python-version == '3.13'
        run: |
          python -m pip install build
          python -m build --sdist --outdir dist
      - name: Record candidate checksums
        if: matrix.python-version == '3.13'
        run: |
          cd dist
          sha256sum aaaat-*.whl aaaat-*.tar.gz > SHA256SUMS
      - name: Install wheel
        run: python -m pip install dist/aaaat-*.whl
      - name: Smoke test installed commands outside checkout
        working-directory: ${{ runner.temp }}
        run: |
          aaaat --version
          aaaat-desktop --help
          aaaat-upgrade --help
          aaaat-seed-desktop-demo --help
          aaaat mcp-validate
      - name: Compile package and tests
        run: python -m compileall -q aaaat tests
      - name: Run complete behavioral suite
        shell: bash
        run: |
          set -o pipefail
          python -B -m unittest discover -s tests 2>&1 | tee behavioral-test-output.txt
      - name: Upload behavioral failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: behavioral-test-output-${{ matrix.python-version }}
          path: behavioral-test-output.txt
          if-no-files-found: error
          retention-days: 7
      - name: Install source distribution outside checkout
        if: matrix.python-version == '3.13'
        working-directory: ${{ runner.temp }}
        run: |
          python -m venv sdist-venv
          sdist-venv/bin/python -m pip install "$GITHUB_WORKSPACE"/dist/aaaat-*.tar.gz
          sdist-venv/bin/aaaat --version
          sdist-venv/bin/aaaat-upgrade --help
      - name: Upload validated candidate
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: aaaat-v1-candidate
          path: |
            dist/aaaat-*.whl
            dist/aaaat-*.tar.gz
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 14
