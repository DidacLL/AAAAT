name: V1 Desktop Release Readiness

on:
  push:
  pull_request:

jobs:
  desktop-release-readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install package
        run: python -m pip install -e .
      - name: Compile package and release tests
        run: python -m compileall -q aaaat tests
      - name: Clean storage, projection, offer-first and profile workspace
        run: python -B -m unittest tests.test_local_desktop_dashboard_slice
      - name: Provider-neutral links and preparation ordering
        run: python -B -m unittest tests.test_profile_links_and_preparation
      - name: Material attachment and lifecycle details
        run: python -B -m unittest tests.test_desktop_material_attachment tests.test_desktop_material_details
      - name: Reusable evidence behavior
        run: python -B -m unittest tests.test_desktop_profile_facts
      - name: Demo reset safety
        run: python -B -m unittest tests.test_demo_seed_safety
