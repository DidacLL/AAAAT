name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    name: contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Show Python version
        run: python --version

      - name: Install package with test dependencies
        run: python -m pip install -e .[test]

      - name: Check repository guardrails
        run: python -B tools/repo_guard.py --ci

      - name: Compile Python sources
        run: python -B -m compileall -q aaaat tests tools

      - name: Run contract tests
        run: python -B -m unittest discover -s tests

      - name: Validate MCP descriptors
        run: python -B -m aaaat.cli mcp-validate
