name: Temporary profile result repair

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: temporary-profile-result-repair
  cancel-in-progress: true

jobs:
  repair:
    name: Repair profile task result contract
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out release branch
        uses: actions/checkout@v4
        with:
          ref: didacll/v1-clean-integration
          fetch-depth: 0
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply repair
        run: python .temporary-profile-fix.py

      - name: Verify repair
        shell: bash
        run: |
          set -o pipefail
          python -B -m compileall -q aaaat tests tools scripts
          python -B tools/validate_mcp.py
          python -B -m unittest tests.test_profile_completion tests.test_mcp_runtime
          python -B -m unittest discover -s tests

      - name: Commit source repair
        shell: bash
        run: |
          git add \
            aaaat/SKILL.md \
            aaaat/agent_access.py \
            aaaat/assisted_profile.py \
            aaaat/mcp_runtime.py \
            aaaat/tasks.py \
            tests/test_mcp_runtime.py \
            tests/test_profile_completion.py
          if git diff --cached --quiet; then
            echo "Profile-result repair already present."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Preserve profile tasks on validation failure"
          git push origin HEAD:didacll/v1-clean-integration
