name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    name: contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Show Python version
        run: python --version

      - name: Block private and generated files
        run: |
          bad_files=$(git ls-files | grep -E '(^\.private/|\.sqlite3?$|\.db$|/__pycache__/|\.py[co]$)' || true)
          if [ -n "$bad_files" ]; then
            echo "Forbidden files are tracked:"
            echo "$bad_files"
            exit 1
          fi

      - name: Compile Python sources
        run: python -B -m compileall -q aaaat tests

      - name: Run contract tests
        run: python -B -m unittest discover -s tests

      - name: Validate MCP descriptors
        run: python -B -m aaaat.cli mcp-validate
