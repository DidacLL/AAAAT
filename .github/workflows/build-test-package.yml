name: Build AAAAT test package

on:
  pull_request:
    branches:
      - didacll/v1-recovery-base
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-package:
    name: Windows application package
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Check out recovery branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[desktop,release]"

      - name: Build packaged application
        shell: pwsh
        run: python tools/build_release.py

      - name: Verify packaged boundary
        shell: pwsh
        run: |
          $package = Get-ChildItem dist -Directory | Where-Object { $_.Name -like 'AAAAT-windows-*' } | Select-Object -First 1
          if (-not $package) { throw 'AAAAT Windows package was not created.' }
          if (-not (Test-Path (Join-Path $package.FullName 'AAAAT.exe'))) { throw 'AAAAT.exe is missing.' }
          if (-not (Test-Path (Join-Path $package.FullName 'bridge\aaaat-host-bridge.exe'))) { throw 'The paired host bridge is missing.' }
          if (Test-Path (Join-Path $package.FullName '.private')) { throw 'Private workspace data entered the application package.' }
          if (Test-Path (Join-Path $package.FullName 'tests')) { throw 'Development tests entered the application package.' }

      - name: Upload application package
        uses: actions/upload-artifact@v4
        with:
          name: AAAAT-Windows-test
          path: dist/AAAAT-windows-*/
          if-no-files-found: error
          retention-days: 7
